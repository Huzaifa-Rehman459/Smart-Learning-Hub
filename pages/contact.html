<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="/style.css">
    <title>Smart Learning Hub</title>
</head>
<body>
    <nav>
        <div class="left-nav">
            <div class="logo">
            <i class="ri-graduation-cap-fill"></i>
            <h1>Smart Learning Hub</h1>
        </div>
        </div>
        <div class="center-nav">
            <ul>
                <a href="/index.html">Home</a>
                <a href="/pages/courses.html">Courses</a>
                <a href="">Quiz</a>
                <a href="/pages/about.html">About</a>
                <a href= "/pages/contact.html">Contact</a>
            </ul>
        </div>
        <div class="right-nav">
            <button class="loginBtn">Login</button>
        </div>
    </nav>
    <main>
        <section class="contact-page" id="contactPage">
            <div class="contact-form">
                <h1>Get in Touch</h1>
                <p>Have questions or want to collaborate?<br>We're here to help!</p>
                <form>
                    <input type="text" placeholder="Your Name">
                    <input type="email" placeholder="Email Address">
                    <input type="text" placeholder="Subject">
                    <textarea placeholder="Your Message" rows="3"></textarea>
                    <button class="formSubmit">Send Message</button>
                </form>
            </div>
            <div class="info-form">
                <div class="contact-info">
                    <h1>Contact Information</h1>
                    <div class="info-wrapper">
                        <i class="ri-map-pin-line"></i>
                        <div class="info-text">
                            <p>Address</p>
                            <span>123 Learning Street,<br>Education City. India</span>
                        </div>
                    </div>

                    <div class="info-wrapper">
                        <i class="ri-mail-fill"></i>
                        <div class="info-text">
                            <p>Email</p>
                            <span>hello@smarthub.com</span>
                        </div>
                    </div>

                    <div class="info-wrapper">
                        <i class="ri-phone-fill"></i>
                        <div class="info-text">
                            <p>Phone</p>
                            <span>+91 98765 43210</span>
                        </div>
                    </div>

                    <div class="info-wrapper">
                        <i class="ri-global-line"></i>
                        <div class="info-text">
                            <p>Website</p>
                            <span>www.smarthub.com</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
     <script src="/script.js"></script>
</body>
</html>
